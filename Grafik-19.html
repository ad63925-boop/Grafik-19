<!-- Панель переключения месяцев -->
<div class="panelMonth">

<h2>График работы охраны Ш_19</h2>

<div class="table-wrapper">
    <table id="scheduleTable"></table>
</div>

<!-- График на одного охраника -->
<div id="calendarView" hidden>

  <div class="calendar-header">
    <select id="guardSelect"></select>
    
    <button id="prevMonth">
      <i class="fa-solid fa-angle-left"></i>
    </button>
    <span id="monthLabel" class="monthLabel"></span>
    <button id="nextMonth">
      <i class="fa-solid fa-angle-right"></i>
    </button>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<br>

<!-- Панель настроек -->
<div id="panelSeting" class="is-hidden">
	<div class="panel-header">
    <span><i class="fa-solid fa-gear"></i> Настройки</span>
    <button class="btn-close" id="btnClosePanelSeting">
      <i class="fa-solid fa-xmark">
    </i></button>
</div>

<div class="panel">
<input type="text" id="newEmployeeName" class="inputNewName" placeholder="+ Добавить сотрудника в базу">
<button class="btn-graf" id="BtnAddEmployeeToList">
  <i class="fa-solid fa-plus"></i> В базу</button>
<br>
<select id="employeeSelect" class="selectName"></select>
<button class="btn-graf" id="btnAddEmployeeToTable"><i class="fa-solid fa-plus"></i> В график отдельно</button>
<button class="btn-graf" id="btnRemoveEmployeeFromList"><i class="fa-solid fa-trash"></i> Удалить</button>
<button class="btn-graf" id="btnShowEmployeesPanel"><i class="fa-solid fa-database"></i> База Сотрудников!</button>
<button class="btn-graf" id="btnClearShifts"><i class="fa-solid fa-broom"></i> Очистить смены</button>
</div>

</div>

<!-- Шаблоны смен -->
<div class="panel">
    <button class="btn-graf" id="btnApplyTemplateForOne4">
      <i class="fa-solid fa-clone"></i> Шаблон 2д/2в</button>
    <button class="btn-graf" id="btnApplyTemplateForOne">
      <i class="fa-solid fa-clone"></i> Шаблон 4д/2в</button>
    <button class="btn-graf" id="btnShowapplyBatchShift">
      <i class="fa-regular fa-calendar-check"></i> Добавить смены</button>
</div>
<hr>

<!-- Экспорт и импорт -->
<div class="panel">
    <button class="btn-graf" id="btnExportData">
      <i class="fa-solid fa-file-export"></i> Экспорт</button>
    <button class="btn-graf" id="btnImportData">
      <i class="fa-solid fa-file-import"></i> Импорт</button>
    <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importData(event)">
</div>
<hr>
	<div class="panel">
	<label for="printScale">Размер печати:</label>
    <select id="printScale" class="printScale">
        <option value="0.6">Маленький</option>
        <option value="0.8" selected>Средний</option>
        <option value="1">Большой</option>
    </select>
    <label for="copiInput">Копии:</label>
    <input type="number" id="copiInput" class="printCopy" placeholder="1">
    <button class="btn-graf" id="btnPrintSchedule">
      <i class="fa-solid fa-print"></i> Печать</button>
	</div>
</div>

<!-- Назначение смен -->

<!-- Назначение смен по датам -->
<div id="batchShift" class="batch-shift-form">
  <h4>Назначение смен</h4>

  <!-- Выбор сотрудника -->
  <div style="margin: 10px 0;">
    <label>Сотрудник:</label><br>
    <select id="batchEmpSelect" class="batch-user-select">
      <!-- Опции заполняются JS -->
    </select>
  </div>

  <!-- Выбор смены -->
  <div style="margin: 10px 0;">
    <label>Смена:</label><br>
    <select id="batchShiftSelect" class="batch-shift-select">
      <!-- Опции заполняются из SHIFT_TYPES -->
    </select>
  </div>

  <!-- Выбор дат (multiple) -->
  <div style="margin: 10px 0;">
    <label>Даты:</label><br>
    <select id="batchDatesSelect" multiple size="31" class="batch-date-select">
      <!-- Опции: числа месяца -->
    </select>
  </div>

  <div class="btn-set-close">
    <button id="btnApplyBatchShifts">✅ Применить</button>
    <button class="btn-closes" id="btnCloseBath">❌ Отмена</button>
  </div>

</div>

 <!-- База сотрудников -->
<div id="employeesPanel" class="panel-hidden" style="margin-top:20px; padding:15px; border:1px solid #ccc; border-radius:8px;">

  <div class="employees-header">
    <span>База сотрудников</span>
    <button id="btnCloseEmployeesPanel">✖</button>
</div>
  <div id="employeesList"></div>
</div>
